<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-TOOLS | Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .dark-mode { background-color: #0F172A; }
        .dark-mode .app-card { background-color: #1E293B; border-color: #334155; color: white; }
        .dark-mode .input-field { background-color: #0F172A; border-color: #334155; color: white; }
        .hidden-view { display: none; }
        .mode-btn-active { background-color: #4F46E5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .nav-active { color: #4F46E5 ! shadow: 0 -4px 10px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body id="app-body" class="bg-[#F8FAFC] text-slate-900 pb-36">

    <nav class="p-6 flex justify-between items-center bg-white/70 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-black text-xl shadow-lg">Z</div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Tools</h1>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 transition-all active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
    </nav>

    <main class="max-w-lg mx-auto mt-6 p-4">
        
        <div class="app-card bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-slate-100 p-8 transition-all">
            
            <div id="gpa-view" class="view-content">
                <h2 class="text-2xl font-extrabold mb-1 tracking-tight">Grade Analytics</h2>
                <div class="flex justify-between items-center my-6 bg-slate-50 dark:bg-slate-900 p-1.5 rounded-2xl border border-slate-100 dark:border-slate-800">
                    <button onclick="switchGPAMode('sem')" id="btn-sem" class="flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest mode-btn-active">Semester GPA</button>
                    <button onclick="switchGPAMode('cum')" id="btn-cum" class="flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-slate-400">Cumulative CGPA</button>
                </div>

                <div id="sem-form">
                    <div id="course-list" class="space-y-3"></div>
                    <button onclick="addCourse()" class="mt-4 text-indigo-600 font-bold text-[10px] uppercase tracking-widest">+ Add Subject</button>
                </div>

                <div id="cum-form" class="hidden-view">
                    <div id="sem-list" class="space-y-3"></div>
                    <button onclick="addSemester()" class="mt-4 text-indigo-600 font-bold text-[10px] uppercase tracking-widest">+ Add Semester</button>
                </div>

                <div class="mt-8 p-8 bg-[#0F172A] rounded-[2rem] text-center shadow-xl">
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Calculated Result</p>
                    <h3 id="result" class="text-5xl font-black text-white tracking-tighter">0.00</h3>
                    <div class="mt-4 pt-4 border-t border-slate-800">
                        <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Percentage Equivalent</p>
                        <h3 id="percent-result" class="text-2xl font-bold text-indigo-400">0.0%</h3>
                    </div>
                </div>
                <button onclick="calculateFinal()" class="w-full mt-6 bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">Calculate Analytics</button>
            </div>

            <div id="pdf-view" class="view-content hidden-view">
                <h2 class="text-2xl font-extrabold mb-1 tracking-tight">Smart PDF</h2>
                <p class="text-slate-400 text-sm mb-6 font-medium">Bundle notes and images.</p>
                <div class="space-y-4">
                    <input type="text" id="pdf-title" placeholder="Document Name" class="input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none font-bold">
                    
                    <div class="border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-3xl p-6 text-center bg-slate-50/50 dark:bg-slate-900/30">
                        <label for="img-up" class="cursor-pointer">
                            <div class="flex flex-col items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Attach Images</span>
                            </div>
                        </label>
                        <input type="file" id="img-up" accept="image/*" multiple class="hidden" onchange="previewImages(event)">
                        <div id="previews" class="flex flex-wrap gap-2 mt-4 justify-center"></div>
                    </div>

                    <textarea id="pdf-content" placeholder="Content text..." class="input-field w-full h-32 bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none resize-none"></textarea>
                </div>
                <button onclick="generatePDF()" class="w-full mt-8 bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all">Export Document</button>
            </div>

            <div id="synopsis-view" class="view-content hidden-view">
                <h2 class="text-2xl font-extrabold mb-1 tracking-tight">Synopsis Pro</h2>
                <p class="text-slate-400 text-sm mb-8 font-medium tracking-tight">Generate professional abstracts.</p>
                <div class="space-y-4">
                    <input type="text" id="syn-name" placeholder="Project Title" class="input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none font-bold">
                    <input type="text" id="syn-stack" placeholder="Tech Stack (e.g. Python, SQL)" class="input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none">
                    <textarea id="syn-desc" placeholder="Project Description..." class="input-field w-full h-24 bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none resize-none"></textarea>
                    <button onclick="generateSynopsis()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl">Generate Summary</button>
                    <div id="syn-output" class="hidden p-5 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 text-sm leading-relaxed italic text-slate-600 dark:text-slate-300"></div>
                </div>
            </div>

            <div id="pulse-view" class="view-content hidden-view">
                <h2 class="text-2xl font-extrabold mb-1 tracking-tight text-center">Deadline Pulse</h2>
                <div class="space-y-3 mt-8">
                    <input type="text" id="task-name" placeholder="Assignment Name" class="input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none">
                    <input type="date" id="task-date" class="input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none">
                    <button onclick="addTask()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg">Set Deadline</button>
                </div>
                <div id="task-list" class="space-y-3 mt-8 pt-4 border-t border-slate-50 dark:border-slate-800"></div>
            </div>

        </div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-white/80 backdrop-blur-xl border border-slate-200 shadow-2xl rounded-[2.5rem] p-4 flex justify-around items-center z-50 dark:bg-slate-900/90 dark:border-slate-700">
        <button onclick="showView('gpa')" id="nav-gpa" class="nav-btn text-indigo-600 flex flex-col items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10" /></svg><span class="text-[8px] font-black uppercase tracking-tighter">Grades</span></button>
        <button onclick="showView('pdf')" id="nav-pdf" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg><span class="text-[8px] font-black uppercase tracking-tighter">PDF</span></button>
        <button onclick="showView('synopsis')" id="nav-synopsis" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg><span class="text-[8px] font-black uppercase tracking-tighter">Docs</span></button>
        <button onclick="showView('pulse')" id="nav-pulse" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span class="text-[8px] font-black uppercase tracking-tighter">Pulse</span></button>
    </div>

    <script>
        let currentMode = 'sem';
        let pdfImages = [];
        window.onload = () => { addCourse(); addSemester(); };

        function toggleTheme() { document.getElementById('app-body').classList.toggle('dark-mode'); }

        function showView(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-300'));
            document.getElementById(`${view}-view`).classList.remove('hidden-view');
            document.getElementById(`nav-${view}`).classList.replace('text-slate-300', 'text-indigo-600');
        }

        function switchGPAMode(mode) {
            currentMode = mode;
            document.getElementById('sem-form').classList.toggle('hidden-view', mode !== 'sem');
            document.getElementById('cum-form').classList.toggle('hidden-view', mode !== 'cum');
            document.getElementById('btn-sem').className = `flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${mode === 'sem' ? 'mode-btn-active' : 'text-slate-400'}`;
            document.getElementById('btn-cum').className = `flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${mode === 'cum' ? 'mode-btn-active' : 'text-slate-400'}`;
        }

        function calculateFinal() {
            let score = 0;
            if (currentMode === 'sem') {
                let pts = 0, crs = 0;
                document.querySelectorAll('.credit-input').forEach((c, i) => {
                    const cv = parseFloat(c.value) || 0, gv = parseFloat(document.querySelectorAll('.grade-input')[i].value) || 0;
                    pts += (cv * gv); crs += cv;
                });
                score = crs > 0 ? (pts / crs) : 0;
            } else {
                let total = 0, count = 0;
                document.querySelectorAll('.sem-input').forEach(s => { if(s.value) { total += parseFloat(s.value); count++; } });
                score = count > 0 ? (total / count) : 0;
            }
            document.getElementById('result').innerText = score.toFixed(2);
            document.getElementById('percent-result').innerText = (score * 9.5).toFixed(1) + "%";
        }

        function addCourse() {
            const div = document.createElement('div'); div.className = 'grid grid-cols-2 gap-3 mt-3';
            div.innerHTML = `<input type="number" placeholder="Credits" class="input-field bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none credit-input w-full"><input type="number" placeholder="Grade" class="input-field bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none grade-input w-full">`;
            document.getElementById('course-list').appendChild(div);
        }

        function addSemester() {
            const input = document.createElement('input');
            input.className = 'input-field w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none sem-input mt-3';
            input.placeholder = `Previous SGPA`;
            document.getElementById('sem-list').appendChild(input);
        }

        function previewImages(event) {
            const files = event.target.files; const container = document.getElementById('previews');
            container.innerHTML = ''; pdfImages = [];
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pdfImages.push(e.target.result);
                    const img = document.createElement('img'); img.src = e.target.result;
                    img.className = 'w-10 h-10 object-cover rounded-lg border border-slate-200';
                    container.appendChild(img);
                }; reader.readAsDataURL(file);
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const title = document.getElementById('pdf-title').value || "Z-Tools Export";
            doc.setFont("helvetica", "bold"); doc.text(title, 20, 20);
            const content = document.getElementById('pdf-content').value;
            if(content) doc.text(doc.splitTextToSize(content, 170), 20, 35);
            pdfImages.forEach(img => { doc.addPage(); doc.addImage(img, 'JPEG', 10, 10, 190, 0); });
            doc.save(`${title}.pdf`);
        }

        function generateSynopsis() {
            const out = document.getElementById('syn-output');
            out.innerText = `The project "${document.getElementById('syn-name').value}" utilizes a ${document.getElementById('syn-stack').value} stack to achieve ${document.getElementById('syn-desc').value}. It is built with high efficiency and modular architecture.`;
            out.classList.remove('hidden');
        }

        function addTask() {
            const n = document.getElementById('task-name').value;
            const d = document.getElementById('task-date').value;
            if(!n || !d) return;
            const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
            const list = document.getElementById('task-list');
            const row = document.createElement('div');
            row.className = "flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700";
            row.innerHTML = `<span class="font-bold text-sm">${n}</span><span class="text-[9px] font-black px-3 py-1 bg-indigo-600 text-white rounded-full uppercase">${diff <= 0 ? 'DUE' : diff + 'd left'}</span>`;
            list.prepend(row);
        }
    </script>
</body>
</html>
